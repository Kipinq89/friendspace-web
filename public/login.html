<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FriendSpace — Log In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #7B2FBE;
      --secondary: #FF6B9D;
      --accent:    #FFD700;
      --bg:        #0d0520;
      --surface:   rgba(255,255,255,0.04);
      --surface2:  rgba(255,255,255,0.08);
      --border:    rgba(255,255,255,0.1);
      --text:      #f0e6ff;
      --muted:     #9b7ec8;
      --danger:    #ff4f4f;
      --success:   #4caf82;
      --font:      'Nunito', sans-serif;
      --title:     'Righteous', cursive;
    }

    /* ── Base ── */
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated background ── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    /* Gradient mesh */
    .bg-scene::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%,  rgba(123,47,190,0.5) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 80%,  rgba(255,107,157,0.4) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 50% 100%, rgba(255,215,0,0.15) 0%, transparent 50%),
        #0d0520;
      animation: meshShift 12s ease-in-out infinite alternate;
    }

    @keyframes meshShift {
      from { filter: hue-rotate(0deg); }
      to   { filter: hue-rotate(15deg); }
    }

    /* Floating particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: floatPart linear infinite;
    }

    @keyframes floatPart {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* Grid lines */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,107,157,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,157,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* Orbit logo SVG in background */
    .bg-orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      opacity: 0.03;
      pointer-events: none;
    }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Auth card ── */
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(13, 5, 32, 0.8);
      border: 1px solid rgba(255,107,157,0.2);
      border-radius: 28px;
      padding: 40px 36px;
      backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(123,47,190,0.1),
        0 32px 64px rgba(0,0,0,0.5),
        0 0 80px rgba(123,47,190,0.1);
      animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
      animation: cardIn 0.6s 0.1s both;
    }

    .auth-logo svg {
      filter: drop-shadow(0 0 10px rgba(255,107,157,0.6));
    }

    .logo-ring-1 {
      transform-origin: 32px 32px;
      animation: orbitSpin1 8s linear infinite;
    }
    .logo-ring-2 {
      transform-origin: 32px 32px;
      animation: orbitSpin2 12s linear infinite reverse;
    }
    .logo-dot-1 {
      transform-origin: 32px 32px;
      animation: orbitSpin1 8s linear infinite;
    }
    .logo-dot-2 {
      transform-origin: 32px 32px;
      animation: orbitSpin2 12s linear infinite reverse;
    }
    @keyframes orbitSpin1 { to { transform: rotate(360deg); } }
    @keyframes orbitSpin2 { to { transform: rotate(360deg); } }

    .auth-wordmark {
      font-family: var(--title);
      font-size: 28px;
    }
    .auth-wordmark .fr { color: #FF6B9D; }
    .auth-wordmark .sp { color: #FFD700; }

    /* ── Tab switcher ── */
    .auth-tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 28px;
      animation: cardIn 0.6s 0.15s both;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      font-family: var(--font);
      background: none;
      border: none;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .auth-tab.active {
      background: linear-gradient(135deg, var(--primary), #9B59B6);
      color: #fff;
      box-shadow: 0 4px 14px rgba(123,47,190,0.4);
    }

    /* ── Form panels ── */
    .auth-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
    }
    .auth-panel.active { display: flex; }

    /* ── Field ── */
    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: fieldIn 0.3s ease both;
    }

    @keyframes fieldIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .auth-field label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      opacity: 0.6;
    }

    .auth-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 12px 14px 12px 42px;
      font-size: 14px;
      font-family: var(--font);
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
    }

    .auth-input::placeholder { color: rgba(255,255,255,0.25); }

    .auth-input:focus {
      border-color: var(--secondary);
      background: rgba(255,107,157,0.05);
      box-shadow: 0 0 0 3px rgba(255,107,157,0.12);
    }

    .auth-input.valid {
      border-color: var(--success);
      box-shadow: 0 0 0 3px rgba(76,175,130,0.12);
    }

    .auth-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,79,79,0.12);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%  { transform: translateX(-6px); }
      75%  { transform: translateX(6px); }
    }

    /* Password toggle */
    .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.5;
      transition: opacity 0.2s;
    }
    .pw-toggle:hover { opacity: 1; }

    /* Password strength */
    .pw-strength {
      display: flex;
      gap: 4px;
      margin-top: 4px;
    }
    .pw-bar {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      transition: background 0.3s ease;
    }
    .pw-bar.weak   { background: var(--danger); }
    .pw-bar.fair   { background: var(--accent); }
    .pw-bar.strong { background: var(--success); }

    /* ── Field note / error ── */
    .field-note {
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
      transition: color 0.2s;
    }
    .field-note.err  { color: var(--danger); }
    .field-note.ok   { color: var(--success); }

    /* ── Submit button ── */
    .auth-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      font-family: var(--font);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .auth-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .auth-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255,107,157,0.4);
    }

    .auth-submit:hover::before { opacity: 1; }

    .auth-submit:active { transform: translateY(0); }

    .auth-submit.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .auth-submit .btn-text { transition: opacity 0.2s; }
    .auth-submit .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .auth-submit.loading .btn-text { display: none; }
    .auth-submit.loading .btn-spinner { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 11px;
      margin: 4px 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Social login ── */
    .social-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .social-btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    /* ── Toast ── */
    .auth-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 11px 22px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(20px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      white-space: nowrap;
      z-index: 999;
    }

    .auth-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .auth-toast.success { border-color: var(--success); color: var(--success); }
    .auth-toast.error   { border-color: var(--danger);  color: var(--danger);  }

    /* ── Footer note ── */
    .auth-footer {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 20px;
      line-height: 1.7;
      animation: cardIn 0.6s 0.3s both;
    }

    .auth-footer a { color: var(--secondary); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Tagline below logo ── */
    .auth-tagline {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
      margin-top: -20px;
      margin-bottom: 28px;
      animation: cardIn 0.6s 0.12s both;
    }

    /* Checkbox */
    .auth-check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .auth-check-row input[type="checkbox"] {
      accent-color: var(--secondary);
      width: 15px; height: 15px;
      cursor: pointer;
    }

    .auth-check-row a { color: var(--secondary); }

    /* Forgot password */
    .forgot-link {
      text-align: right;
      font-size: 11px;
      margin-top: -8px;
    }
    .forgot-link a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link a:hover { color: var(--secondary); }
  </style>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-scene">
    <div class="bg-grid"></div>
    <!-- Particles injected by JS -->
  </div>

  <!-- Toast -->
  <div class="auth-toast" id="toast"></div>

  <div class="page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
          <defs>
            <radialGradient id="l-core" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#FF6B9D"/>
              <stop offset="100%" stop-color="#7B2FBE"/>
            </radialGradient>
            <radialGradient id="l-dot1" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#FFD700"/>
              <stop offset="100%" stop-color="#FF6B9D"/>
            </radialGradient>
          </defs>
          <ellipse cx="32" cy="32" rx="26" ry="11" stroke="#FF6B9D" stroke-width="1.8"
            stroke-dasharray="5 3" fill="none" opacity="0.7" class="logo-ring-1"/>
          <ellipse cx="32" cy="32" rx="11" ry="26" stroke="#7B2FBE" stroke-width="1.8"
            stroke-dasharray="5 3" fill="none" opacity="0.6" class="logo-ring-2"/>
          <circle cx="32" cy="32" r="9" fill="url(#l-core)"/>
          <circle cx="32" cy="32" r="5" fill="white" opacity="0.22"/>
          <circle cx="58" cy="32" r="4.5" fill="url(#l-dot1)" class="logo-dot-1"/>
          <circle cx="32" cy="6"  r="3.5" fill="#FFD700" class="logo-dot-2"/>
        </svg>
        <span class="auth-wordmark">
          <span class="fr">Friend</span><span class="sp">Space</span>
        </span>
      </div>

      <p class="auth-tagline">Your little corner of the internet ✨</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">🔑 Log In</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">✨ Sign Up</button>
      </div>

      <!-- ── LOGIN PANEL ── -->
      <div class="auth-panel active" id="panel-login">
        <div class="auth-field" style="animation-delay:0.05s">
          <label>Email</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input class="auth-input" id="login-email" type="email"
              placeholder="your@email.com" autocomplete="email"
              oninput="validateEmail(this,'login-email-note')">
          </div>
          <div class="field-note" id="login-email-note"></div>
        </div>

        <div class="auth-field" style="animation-delay:0.1s">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input class="auth-input" id="login-password" type="password"
              placeholder="Your password" autocomplete="current-password">
            <button class="pw-toggle" onclick="togglePw('login-password',this)" type="button">👁</button>
          </div>
          <div class="field-note" id="login-pw-note"></div>
        </div>

        <div class="forgot-link">
          <a href="#" onclick="showToast('Password reset link sent! 📧','success');return false;">
            Forgot password?
          </a>
        </div>

        <button class="auth-submit" id="btn-login" onclick="handleLogin()">
          <span class="btn-text">Log In 💜</span>
          <div class="btn-spinner"></div>
        </button>

        <div class="auth-divider">or continue with</div>

        <div class="social-btns">
          <button class="social-btn" onclick="showToast('Google login coming soon!','')">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button class="social-btn" onclick="showToast('Discord login coming soon!','')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#5865F2">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
            Discord
          </button>
        </div>
      </div>

      <!-- ── REGISTER PANEL ── -->
      <div class="auth-panel" id="panel-register">
        <div class="auth-field" style="animation-delay:0.05s">
          <label>Display Name</label>
          <div class="input-wrap">
            <span class="input-icon">✨</span>
            <input class="auth-input" id="reg-name" type="text"
              placeholder="xX_CoolUser_Xx" autocomplete="name"
              oninput="validateUsername(this,'reg-name-note')">
          </div>
          <div class="field-note" id="reg-name-note"></div>
        </div>

        <div class="auth-field" style="animation-delay:0.08s">
          <label>Email</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input class="auth-input" id="reg-email" type="email"
              placeholder="your@email.com" autocomplete="email"
              oninput="validateEmail(this,'reg-email-note')">
          </div>
          <div class="field-note" id="reg-email-note"></div>
        </div>

        <div class="auth-field" style="animation-delay:0.11s">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input class="auth-input" id="reg-password" type="password"
              placeholder="Min 6 characters" autocomplete="new-password"
              oninput="checkStrength(this)">
            <button class="pw-toggle" onclick="togglePw('reg-password',this)" type="button">👁</button>
          </div>
          <div class="pw-strength" id="pw-strength-bars">
            <div class="pw-bar" id="bar1"></div>
            <div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div>
            <div class="pw-bar" id="bar4"></div>
          </div>
          <div class="field-note" id="reg-pw-note"></div>
        </div>

        <div class="auth-field" style="animation-delay:0.14s">
          <label>Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔐</span>
            <input class="auth-input" id="reg-confirm" type="password"
              placeholder="Repeat password" autocomplete="new-password"
              oninput="validateConfirm(this)">
          </div>
          <div class="field-note" id="reg-confirm-note"></div>
        </div>

        <div class="auth-check-row" style="animation-delay:0.17s">
          <input type="checkbox" id="reg-terms">
          <label for="reg-terms">
            I agree to the <a href="terms.html" target="_blank">Terms of Service</a>
            and <a href="privacy.html" target="_blank">Privacy Policy</a>
          </label>
        </div>

        <button class="auth-submit" id="btn-register" onclick="handleRegister()">
          <span class="btn-text">Create Account ✨</span>
          <div class="btn-spinner"></div>
        </button>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        By continuing, you agree to FriendSpace's
        <a href="terms.html" target="_blank">Terms</a> · <a href="privacy.html" target="_blank">Privacy</a> · <a href="help.html" target="_blank">Help</a>
        <br>
        <span style="margin-top:4px;display:inline-block;">✨ FriendSpace © 2024</span>
      </div>

    </div>
  </div>

  <script>
    if (localStorage.getItem('fs_token')) {
        window.location.href = 'index.html';
    }

    // ── Particles ──────────────────────────────────────────────
    const scene = document.querySelector('.bg-scene');
    const EMOJIS = ['✨','💜','⭐','🎵','🌙','🔥','💫','🎸'];
    const COLORS = ['rgba(255,107,157,0.5)','rgba(123,47,190,0.5)','rgba(255,215,0,0.4)'];

    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 3;
      const useEmoji = Math.random() > 0.5;
      if (useEmoji) {
        p.style.cssText = `
          font-size:${size * 2}px;
          left:${Math.random() * 100}%;
          animation-duration:${8 + Math.random() * 12}s;
          animation-delay:${Math.random() * 10}s;
          background:none;
        `;
        p.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
      } else {
        p.style.cssText = `
          width:${size}px; height:${size}px;
          left:${Math.random() * 100}%;
          background:${COLORS[Math.floor(Math.random() * COLORS.length)]};
          animation-duration:${8 + Math.random() * 12}s;
          animation-delay:${Math.random() * 10}s;
          blur:2px;
        `;
      }
      scene.appendChild(p);
    }

    // ── Tab switch ────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('panel-' + tab).classList.add('active');
    }

    // ── Validators ───────────────────────────────────────────
    function validateEmail(input, noteId) {
      const note = document.getElementById(noteId);
      const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input.value.trim());
      input.className = 'auth-input ' + (input.value ? (ok ? 'valid' : 'error') : '');
      note.textContent = input.value && !ok ? '⚠ Enter a valid email address.' : '';
      note.className = 'field-note ' + (input.value && !ok ? 'err' : '');
    }

    function validateUsername(input, noteId) {
      const note = document.getElementById(noteId);
      const val = input.value.trim();
      const ok = val.length >= 3 && val.length <= 30;
      input.className = 'auth-input ' + (val ? (ok ? 'valid' : 'error') : '');
      note.textContent = val && !ok ? '⚠ 3–30 characters please.' : (ok ? '✓ Looks great!' : '');
      note.className = 'field-note ' + (val && !ok ? 'err' : (ok ? 'ok' : ''));
    }

    function checkStrength(input) {
      const val = input.value;
      const note = document.getElementById('reg-pw-note');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const bars = ['bar1','bar2','bar3','bar4'];
      const levels = ['', 'weak', 'fair', 'strong', 'strong'];
      const labels = ['', '😬 Too short', '🤔 Weak', '😊 Fair', '💪 Strong!'];

      bars.forEach((id, i) => {
        const bar = document.getElementById(id);
        bar.className = 'pw-bar ' + (i < score ? levels[score] : '');
      });

      note.textContent = val ? labels[score] : '';
      note.className = 'field-note ' + (score === 4 ? 'ok' : score <= 1 ? 'err' : '');
    }

    function validateConfirm(input) {
      const pw = document.getElementById('reg-password').value;
      const note = document.getElementById('reg-confirm-note');
      const match = input.value === pw && input.value.length > 0;
      input.className = 'auth-input ' + (input.value ? (match ? 'valid' : 'error') : '');
      note.textContent = input.value && !match ? '⚠ Passwords do not match.' : (match ? '✓ Passwords match!' : '');
      note.className = 'field-note ' + (input.value && !match ? 'err' : (match ? 'ok' : ''));
    }

    // ── Toggle password visibility ───────────────────────────
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.textContent = isText ? '👁' : '🙈';
    }

    // ── Login handler ────────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('btn-login');

      // Client-side check
      if (!email || !password) {
        shakeField(email ? 'login-password' : 'login-email');
        showToast('Please fill in all fields.', 'error');
        return;
      }

      btn.classList.add('loading');

      try {
        const res = await fetch('http://localhost:3000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Login failed.', 'error');
          shakeField('login-password');
        } else {
          localStorage.setItem('fs_token', data.token);
          localStorage.setItem('fs_user', JSON.stringify(data.user));
          showToast('Welcome back! 💜', 'success');
          setTimeout(() => window.location.href = 'index.html', 1000);
        }
      } catch {
        showToast('Cannot connect to server.', 'error');
      } finally {
        btn.classList.remove('loading');
      }
    }

    // ── Register handler ─────────────────────────────────────
    async function handleRegister() {
      const username = document.getElementById('reg-name').value.trim();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;
      const terms    = document.getElementById('reg-terms').checked;
      const btn      = document.getElementById('btn-register');

      if (!username || !email || !password || !confirm) {
        showToast('Please fill in all fields.', 'error');
        return;
      }
      if (password !== confirm) {
        showToast('Passwords do not match.', 'error');
        shakeField('reg-confirm');
        return;
      }
      if (password.length < 6) {
        showToast('Password too short.', 'error');
        shakeField('reg-password');
        return;
      }
      if (!terms) {
        showToast('Please accept the Terms of Service.', 'error');
        return;
      }

      btn.classList.add('loading');

      try {
        const res = await fetch('http://localhost:3000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showToast(data.error || 'Registration failed.', 'error');
        } else {
          localStorage.setItem('fs_token', data.token);
          localStorage.setItem('fs_user', JSON.stringify(data.user));
          showToast('Account created! Welcome to FriendSpace ✨', 'success');
          setTimeout(() => window.location.href = 'index.html', 1200);
        }
      } catch {
        showToast('Cannot connect to server.', 'error');
      } finally {
        btn.classList.remove('loading');
      }
    }

    // ── Enter key support ────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const activePanel = document.querySelector('.auth-panel.active').id;
      if (activePanel === 'panel-login')    handleLogin();
      if (activePanel === 'panel-register') handleRegister();
    });

    // ── Toast ────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      clearTimeout(toastTimer);
      t.textContent = msg;
      t.className = 'auth-toast show ' + type;
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Shake animation helper ───────────────────────────────
    function shakeField(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.classList.remove('error');
      void el.offsetWidth; // reflow
      el.classList.add('error');
    }
  </script>
</body>
</html>
